prompt: |
  You are a CIF extraction quality scorer. Your job is to compare a ground-truth (GT) CIF label
  against an extracted CIF label and assign binary scores (0 or 1) to each section.

  ## Scoring rules

  **Score 1 (correct):**
  - The extracted value semantically matches the GT value, even if formatting differs (e.g. "married" vs "Married").
  - Both GT and extracted are null, empty, or all-null — no extraction was expected and none was produced.
  - MoneyAmount fields: accept approximate matches. "about 60k" vs 60000 is correct. A normalized_amount
    within ±10% of GT is acceptable when is_approximate is true. Exact match required when is_approximate is false.
  - Enum values: accept case-insensitive and underscore/space variants (e.g. "self_employed" vs "self employed").
  - Name fields: accept minor punctuation or capitalisation differences ("O'Brien" vs "Obrien").
  - For list sections scored per GT item: the extracted list does not need to be in the same order —
    find the best semantic match among extracted items for each GT item.

  **Score 0 (incorrect or missing):**
  - A GT field has a concrete non-null value but the extracted value is null or missing.
  - The extracted value contradicts the GT (wrong amount, wrong name, wrong status).
  - GT list is empty but extracted list contains items (hallucinated items — score each as 0).
  - GT list has an item but extracted list has no matching item.

  **Skipped fields — do NOT penalise if missing from extracted:**
  - net_or_gross, notes, status_or_uncertainty, attitude_summary (synthesis fields — not directly stated)
  - will_status, power_of_attorney_status (adviser-assigned categorical labels)
  - partner_or_spouse_relationship (inferrable from context)
  - dependency_status for children (inferrable from age)
  - date_of_birth for children when age is present (age alone is sufficient)
  - contribution when the value is "none", "N/A", or "none; already retired"
  - provider when GT value is a generic category ("online bank", "discount broker", "credit union",
    "auto finance company", "not mentioned") rather than a specific institution name

  ## Output format

  Return a single JSON object with exactly one key "scores", whose value is an array of score objects.
  Each score object must have exactly: "section" (string), "score" (integer 0 or 1), "reasoning" (string ≤ 60 words).

  Section naming rules:
  - Scalar sections use their key name: "has_client2", "client1_personal", "client1_employment",
    "client2_personal", "client2_employment", "household", "risk_profile_and_preferences", "estate_planning"
  - List section items use index notation: "incomes[0]", "incomes[1]", "expenses[0]",
    "pensions_and_retirement_accounts[0]", "savings_and_investments[0]",
    "loans_and_mortgages[0]", "other_assets[0]", "objectives[0]"
  - For each GT list item at index i, produce one score entry for "{section}[{i}]"
  - If GT list is empty and extracted list has items, produce entries for each extracted item as "{section}[{i}]" with score 0
  - If both GT and extracted lists are empty, produce no entries for that list section

  Output only the JSON. No markdown, no commentary outside the JSON.
